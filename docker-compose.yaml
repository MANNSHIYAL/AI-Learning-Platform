# version: '3.8'

services:

  # ---------------------------
  # KAFKA (KRaft mode - NO ZOOKEEPER)
  # ---------------------------
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      # Bitnami
      # # KRaft settings
      # KAFKA_ENABLE_KRAFT: "yes"
      # KAFKA_CFG_PROCESS_ROLES: broker,controller
      # KAFKA_CFG_NODE_ID: 1
      # KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # # Listeners
      # KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      # KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      # KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

      # # Controller listener
      # KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # # Replication (single node)
      # KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      # Apache
      # KRaft Settings
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      
      # Listeners
      # Note: 0.0.0.0 allows Kafka to listen on all interfaces inside the container
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      
      # Single Node Settings
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      
      # Storage
      KAFKA_LOG_DIRS: /var/lib/kafka/data

    volumes:
      - ./kafka_data:/var/lib/kafka/data

  # ---------------------------
  # MYSQL
  # ---------------------------
  mysql-auth:
    image: mysql:latest
    container_name: mysql_auth
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: userDb
    ports:
      - "3306:3306"
    volumes:
      - ./mysql-storage/auth-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-task:
    image: mysql:latest
    container_name: mysql_task
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: taskDb
    ports:
      - "3307:3306" # Maps to 3307 on your Windows machine
    volumes:
      - ./mysql-storage/task-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5


  # ---------------------------
  # POSTGRES
  # ---------------------------
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: embeddings
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-storage:/var/lib/postgresql/data
    healthcheck: # Added healthcheck
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------
  # DISCOVERY SERVICE
  # ---------------------------
  discovery-service:
    build:
      context: .
      dockerfile: Dockerfile  # <--- Points to the one in the root folder
      args:
        SERVICE_NAME: discoveryservice
    container_name: discovery-service
    ports:
      - "8761:8761"
    restart: always

  # ---------------------------
  # CONFIG SERVICE
  # ---------------------------
  config-service:
    build: 
      context: .
      dockerfile: Dockerfile  # <--- Points to the one in the root folder
      args:
        SERVICE_NAME: configurationservice
    container_name: config-service
    depends_on:
      - discovery-service
    volumes:
      - ./configurations:/config-repo
    environment:
      SPRING_PROFILES_ACTIVE: native
      SPRING_CLOUD_CONFIG_SERVER_GIT_URI: file:///config-repo
    ports:
      - "8888:8888"
    restart: always

  # ---------------------------
  # AUTH SERVICE
  # ---------------------------
  auth-service:
    build: 
      context: .
      dockerfile: Dockerfile  # <--- Points to the one in the root folder
      args:
        SERVICE_NAME: authservice
    container_name: auth-service
    depends_on:
      - config-service
      - discovery-service
      - mysql-auth
    ports:
      - "8081:8081"
    restart: always

  # ---------------------------
  # TASK SERVICE
  # ---------------------------
  task-service:
    build: 
      context: .
      dockerfile: Dockerfile  # <--- Points to the one in the root folder
      args:
        SERVICE_NAME: taskservice
    container_name: task-service
    depends_on:
      - config-service
      - discovery-service
      - kafka
      - mysql-task
    ports:
      - "8082:8082"
    restart: always

  # ---------------------------
  # AI SERVICE
  # ---------------------------
  ai-service:
    build: 
      context: .
      dockerfile: Dockerfile  # <--- Points to the one in the root folder
      args:
        SERVICE_NAME: aiservice
    container_name: ai-service
    depends_on:
      - config-service
      - discovery-service
      - kafka
    ports:
      - "8083:8083"
    restart: always

  # ---------------------------
  # EMBEDDING SERVICE
  # ---------------------------
  embedding-service:
    build: 
      context: .
      dockerfile: Dockerfile  # <--- Points to the one in the root folder
      args:
        SERVICE_NAME: embeddingservice
    container_name: embedding-service
    depends_on:
      - config-service
      - discovery-service
      - postgres
    ports:
      - "8084:8084"
    restart: always

  # ---------------------------
  # API GATEWAY
  # ---------------------------
  api-gateway:
    build: 
      context: .
      dockerfile: Dockerfile  # <--- Points to the one in the root folder
      args:
        SERVICE_NAME: apigateway
    container_name: api-gateway
    depends_on:
      - config-service
      - discovery-service
    ports:
      - "8080:8080"
    restart: always