# Kafka Common
spring.kafka.bootstrap-server=kafka:9092

spring.kafka.consumer.group-id=default-group
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*

spring.kafka.producer.key-deserializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-deserializer=org.springframework.kafka.support.serializer.JsonSerializer

# Eureka Common
# eureka.client.service-url.defaultZone=http://discovery-service:8761/eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
# Tell Eureka to use the IP address, not the hostname
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true
# Force it to use localhost if the IP still fails
# Add this ONLY to individual files if you want unique IDs in Eureka
eureka.instance.instance-id=${spring.application.name}:${server.port}:localhost




