# Kafka Common
spring.kafka.bootstrap-server=localhost:9092

spring.kafka.consumer.group-id=default-group
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.commom.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*

spring.kafka.producer.key-deserializer=org.apache.kafka.commom.serialization.StringSerializer
spring.kafka.producer.value-deserializer=org.springframework.kafka.support.serializer.JsonSerializer

# Eureka Common
euraka.client.service-url.defaultZone=http://localhost:8761/eureka